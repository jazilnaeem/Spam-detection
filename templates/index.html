<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Filter</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Spam Detection System</h1>
        <form action="/" method="post">
            <textarea id="message" name="message" placeholder="Type your message here...">{{ message if message else '' }}</textarea>
            <button type="submit">Check Message</button>
        </form>

        {% if message %}
        <div class="result">
            <h2>Message:</h2>
            <p>{{ message }}</p>
            <h2>Prediction:</h2>
            <p>{{ 'Spam' if prediction == 1 else 'Not Spam' }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
